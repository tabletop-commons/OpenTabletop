        rules_changes: >-
          Revised rules with clearer tile-placement examples and diagrams.
          Added official variant for quicker two-player games with a reduced
          map. Scoring clarification for Buddha figures — explicitly states
          that ties on a figure type result in no one claiming that type.
        component_changes: >-
          Larger game board (roughly 30% bigger) with improved graphic design
          and better contrast for island regions. Thicker cardboard tiles
          replacing the original thinner stock. Updated artwork by Franz
          Vohwinkel. Plastic figure inserts for Buddhas, Rice Paddies, and
          High Helmets replacing the original flat tokens. Included plastic
          insert for component organization.
        description: >-
          The 2015 Fantasy Flight Games reprint of Samurai features upgraded
          components, a larger board, and revised rules with improved clarity.
          The gameplay is essentially identical to the 1998 original but the
          improved rules presentation and component quality slightly reduce
          the perceived complexity weight by approximately 0.15 points. The
          official two-player variant also slightly reduces maximum playtime.
