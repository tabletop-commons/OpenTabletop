summary: Samurai — edition deltas across printings
description: >-
  Demonstrates edition-level property deltas for Samurai, a classic
  tile-placement area-majority game by Reiner Knizia. The original 1998
  Hans im Gluck edition serves as the canonical baseline. The 2015 Fantasy
  Flight Games reprint has upgraded components and revised rules, resulting
  in a slightly lower perceived weight. This example shows the full editions
  response with embedded deltas as returned by
  GET /games/samurai/editions?include=deltas. See ADR-0035 for the edition
  delta model.
