  canonical_edition_id: "01910000-0003-7001-8000-000000000001"
  editions:
    - id: "01910000-0003-7001-8000-000000000001"
      game_id: "01910000-0003-7000-8000-000000000000"
      name: "Samurai (Original Edition)"
      year_published: 1998
      publisher_id: "0191a100-1111-7000-8000-000000000001"
      language: "de"
      notes: >-
        Original Hans im Gluck German edition with Rio Grande Games English
        distribution. The game that established Reiner Knizia's tile-laying
        trilogy alongside Tigris & Euphrates and Through the Desert. Features
        the classic smaller board and original tile artwork.
    - id: "019324a1-b7c3-7d4e-8f5a-6b7c8d9e0f1a"
      game_id: "01910000-0003-7000-8000-000000000000"
      name: "Samurai (Fantasy Flight Games Edition)"
      year_published: 2015
      publisher_id: "0191a100-2222-7000-8000-000000000002"
      language: "en"
      notes: >-
        Complete redesign with larger board, improved components, and revised
        rulebook with clearer examples. Part of FFG's Eurogame Classics
        reprint line. Widely considered the definitive English-language
        edition.
    - id: "019324a1-c8d4-7e5f-9a6b-7c8d9e0f1a2b"
      game_id: "01910000-0003-7000-8000-000000000000"
      name: "Samurai (Japanese Edition)"
      year_published: 2016
      publisher_id: "0191a100-3333-7000-8000-000000000003"
      language: "ja"
      notes: >-
        Japanese localization based on the 2015 FFG edition components with
        Japanese-language rules and box. Published by Hobby Japan.
