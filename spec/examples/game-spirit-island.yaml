  year_published: 2017
  description: >-
    In the most distant reaches of the world, magic still exists, and spirits
    still inhabit the land. But now the great spirits of the wild places are
    stirring as colonizers encroach ever further into the wilds. As a spirit,
    you must grow in power, learn new ways to use your elemental gifts, and
    work together with your fellow spirits and the native Dahan to drive the
    invaders away.

    Spirit Island is a complex and thematic cooperative game about defending
    your island home from colonizing Invaders. Players are different spirits
    of the land, each with their own unique elemental strengths, play style,
    and approach to problem-solving. Every turn, players simultaneously choose
    which of their power cards to play, paying energy to do so. Using powers
    effectively requires understanding the tempo of the game and the synergies
    between different spirits.
  description_short: >-
    A cooperative strategy game where 1-4 players take on the roles of
    island spirits working together to drive away colonizing invaders
    through unique elemental powers and strategic card play.
