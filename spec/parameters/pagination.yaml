Cursor:
  name: cursor
  in: query
  required: false
  description: >-
    Opaque pagination cursor returned from a previous request. Pass this
    value verbatim to fetch the next page. Do not construct or modify
    cursor values; they are implementation-specific and may change format
    between API versions.
  schema:
    type: string
  example: "eyJpZCI6IjAxOTEyZjRjLTdlM2EtN2IxYS04YzVkLTlmMGUxYTJiM2M0ZCJ9"

Limit:
  name: limit
  in: query
  required: false
  description: >-
    Maximum number of items to return per page. Defaults to 25. The
    server may return fewer items if the result set is smaller.
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 25
  example: 25
