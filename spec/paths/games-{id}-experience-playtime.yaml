get:
  operationId: getGameExperiencePlaytime
  summary: Get experience-adjusted playtime data
  description: >-
    Returns community-reported play time data bucketed by experience level
    for a specific game. Each bucket includes median, 10th percentile, and
    90th percentile times, plus the number of reports. When sufficient data
    exists across all four levels, derived multipliers relative to the
    'experienced' baseline are included. See ADR-0034 for the design
    rationale and experience level definitions.
  tags:
    - Games
    - Statistics
  parameters:
    - name: id
      in: path
      required: true
      description: >-
        The game identifier. Accepts either a UUIDv7 or a URL slug
        (e.g., "spirit-island").
      schema:
        type: string
      example: "spirit-island"
  responses:
    "200":
      description: Experience playtime profile for the game.
      content:
        application/json:
          schema:
            $ref: '../schemas/ExperiencePlaytimeProfile.yaml#/ExperiencePlaytimeProfile'
          example:
            game_id: "01912f4c-7e3a-7b1a-8c5d-9f0e1a2b3c4d"
            levels:
              - game_id: "01912f4c-7e3a-7b1a-8c5d-9f0e1a2b3c4d"
                experience_level: "first_play"
                median_minutes: 165
                min_minutes: 120
                max_minutes: 240
                total_reports: 342
              - game_id: "01912f4c-7e3a-7b1a-8c5d-9f0e1a2b3c4d"
                experience_level: "learning"
                median_minutes: 135
                min_minutes: 100
                max_minutes: 180
                total_reports: 518
              - game_id: "01912f4c-7e3a-7b1a-8c5d-9f0e1a2b3c4d"
                experience_level: "experienced"
                median_minutes: 105
                min_minutes: 75
                max_minutes: 150
                total_reports: 1204
              - game_id: "01912f4c-7e3a-7b1a-8c5d-9f0e1a2b3c4d"
                experience_level: "expert"
                median_minutes: 80
                min_minutes: 60
                max_minutes: 110
                total_reports: 287
            multipliers:
              first_play: 1.57
              learning: 1.29
              experienced: 1.0
              expert: 0.76
            sufficient_data: true
            total_reports: 2351
    "404":
      description: Game not found.
      content:
        application/problem+json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml#/ErrorResponse'
