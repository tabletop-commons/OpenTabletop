get:
  operationId: getGame
  summary: Get a game by ID or slug
  description: >-
    Returns a single game by its UUIDv7 or URL slug. The include parameter
    controls which related resources are embedded in the response. Without
    include, only the core game fields and _links are returned; related
    resources can then be fetched via the hypermedia links.
  tags:
    - Games
  parameters:
    - name: id
      in: path
      required: true
      description: >-
        The game's UUIDv7 or URL slug. Both formats are accepted:
        `01912f4c-7e3a-7b1a-8c5d-9f0e1a2b3c4d` or `spirit-island`.
      schema:
        type: string
      examples:
        uuid:
          summary: UUIDv7 identifier
          value: "01912f4c-7e3a-7b1a-8c5d-9f0e1a2b3c4d"
        slug:
          summary: URL slug
          value: "spirit-island"
    - $ref: '../parameters/include.yaml#/Include'
  responses:
    "200":
      description: The game resource with optional embedded related resources.
      content:
        application/json:
          schema:
            $ref: '../schemas/Game.yaml#/Game'
          example:
            id: "01912f4c-7e3a-7b1a-8c5d-9f0e1a2b3c4d"
            slug: "spirit-island"
            name: "Spirit Island"
            sort_name: "spirit island"
            type: "base_game"
            parent_game_id: null
            year_published: 2017
            description: >-
              In the most distant reaches of the world, magic still exists,
              and spirits still inhabit the land. As encroaching colonizers
              spread, the spirits must band together to defend their island
              home.
            description_short: >-
              A cooperative strategy game where spirits defend their island
              from colonizing invaders using unique elemental powers.
            min_players: 1
            max_players: 4
            min_playtime_minutes: 90
            max_playtime_minutes: 120
            community_playtime_min_minutes: 75
            community_playtime_max_minutes: 150
            community_playtime_median_minutes: 105
            min_age: 13
            weight: 3.86
            weight_votes: 1842
            average_rating: 8.34
            bayes_rating: 8.21
            rating_count: 28456
            mode: "cooperative"
            image_url: "https://images.opentabletop.org/games/spirit-island/cover.jpg"
            thumbnail_url: "https://images.opentabletop.org/games/spirit-island/thumb.jpg"
            bgg_id: 162886
            status: "active"
            created_at: "2025-06-15T10:30:00Z"
            updated_at: "2026-02-20T14:15:00Z"
            _links:
              self:
                href: "/games/spirit-island"
                title: "Spirit Island"
              expansions:
                href: "/games/spirit-island/expansions"
                title: "Expansions for Spirit Island"
              effective_properties:
                href: "/games/spirit-island/effective-properties"
                title: "Effective properties"
              relationships:
                href: "/games/spirit-island/relationships"
                title: "Game relationships"
              designer:
                href: "/designers/r-eric-reuss"
                title: "R. Eric Reuss"
              publisher:
                href: "/publishers/greater-than-games"
                title: "Greater Than Games"
    "404":
      description: No game found with the given ID or slug.
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml#/ErrorResponse'
          example:
            type: "https://api.opentabletop.org/problems/not-found"
            title: "Not Found"
            status: 404
            detail: "No game found with identifier 'nonexistent-game'."
            instance: "https://api.opentabletop.org/games/nonexistent-game"
