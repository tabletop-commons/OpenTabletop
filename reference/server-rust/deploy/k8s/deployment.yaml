apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentabletop-server
  labels:
    app: opentabletop
    component: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: opentabletop
      component: server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: opentabletop
        component: server
    spec:
      containers:
        - name: server
          image: ghcr.io/tabletop-commons/server:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: opentabletop-config
            - secretRef:
                name: opentabletop-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          terminationGracePeriodSeconds: 30
