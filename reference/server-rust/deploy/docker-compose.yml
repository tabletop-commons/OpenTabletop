services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: opentabletop
      POSTGRES_USER: obg
      POSTGRES_PASSWORD: dev-only-password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obg -d opentabletop"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ../
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://obg:dev-only-password@db:5432/opentabletop
      PORT: "8080"
      LOG_LEVEL: debug
      RUST_LOG: opentabletop_server=debug,tower_http=debug
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
