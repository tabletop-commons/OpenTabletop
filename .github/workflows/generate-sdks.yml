name: Generate SDKs

on:
  workflow_dispatch: # Disabled automatic trigger until repo permissions are configured
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - "spec/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    name: Generate SDKs from OpenAPI spec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install OpenAPI Generator CLI
        run: |
          npm install -g @openapitools/openapi-generator-cli
          openapi-generator-cli version-manager set 7.12.0

      - name: Bundle spec
        run: ./scripts/bundle-spec.sh

      - name: Generate Rust SDK
        run: |
          openapi-generator-cli generate \
            -i spec/bundled/openapi.yaml \
            -g rust \
            -o sdks/rust \
            --skip-validate-spec \
            --additional-properties=packageName=opentabletop,packageVersion=0.1.0

      - name: Generate Python SDK
        run: |
          openapi-generator-cli generate \
            -i spec/bundled/openapi.yaml \
            -g python \
            -o sdks/python \
            --skip-validate-spec \
            --additional-properties=packageName=opentabletop,projectName=opentabletop

      - name: Generate JavaScript SDK
        run: |
          openapi-generator-cli generate \
            -i spec/bundled/openapi.yaml \
            -g javascript \
            -o sdks/javascript \
            --skip-validate-spec \
            --additional-properties=projectName=opentabletop,npmName=opentabletop

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: regenerate SDKs from updated OpenAPI spec"
          title: "chore: regenerate SDKs from updated OpenAPI spec"
          body: |
            Auto-generated SDK update triggered by changes to `spec/`.

            Please review the generated code for correctness.
          branch: auto/generate-sdks
          delete-branch: true
          labels: sdk,automated
