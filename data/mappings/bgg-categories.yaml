# BGG Categories -> OpenTabletop Categories Mapping
#
# Reverse index: every BGG category ID mapped to OpenTabletop canonical slug(s).
# Note: Some BGG categories map to OpenTabletop themes or mechanics, not categories.
# Cross-type mappings are noted.
#
# mapping_type:
#   direct  - 1:1 mapping, same concept
#   split   - one BGG term maps to multiple OT terms
#   cross   - BGG category maps to a different OT vocabulary type
#   unmapped - BGG term has no OT equivalent

