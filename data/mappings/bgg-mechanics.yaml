# Direction: BGG -> OpenTabletop
#
# mapping_type:
#   direct  - 1:1 mapping, same concept
#   split   - one BGG term maps to multiple OT terms
#   merge   - multiple BGG terms map to one OT term (listed on each BGG entry)
#   subsumed - BGG term is covered by a broader OT term
#   unmapped - BGG term has no OT equivalent

