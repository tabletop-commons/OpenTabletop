# BGG Themes/Sub-domains -> OpenTabletop Themes Mapping
#
# Reverse index: every BGG theme/sub-domain mapped to OpenTabletop canonical slug(s).
# Note: Some BGG themes map to OpenTabletop categories rather than themes.
# Cross-type mappings are noted.
#
# mapping_type:
#   direct  - 1:1 mapping, same concept
#   split   - one BGG term maps to multiple OT terms
#   cross   - BGG theme maps to a different OT vocabulary type
#   unmapped - BGG term has no OT equivalent

