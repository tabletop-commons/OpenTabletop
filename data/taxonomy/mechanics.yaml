# OpenTabletop Canonical Mechanics Taxonomy
#
# This is a phylogenetic model of board game mechanics -- mechanics as an
# evolutionary tree, not a flat tag list. Each mechanic includes its
# evolutionary lineage, the game that codified it (origin/speciation event),
# and a precise definition that distinguishes it from related mechanics.
#
# Structure:
#   slug          -- canonical identifier (lowercase, hyphenated, max 50 chars)
#   name          -- display name
#   definition    -- precise, distinguishing definition
#   ancestor_slugs -- what this mechanic evolved FROM (evolutionary lineage)
#   children_slugs -- what evolved FROM this mechanic
#   origin_game   -- the game that created/codified this as a distinct mechanic
#   origin_year   -- year of that game's publication
#   era           -- broad era when this mechanic emerged as recognized
#   examples      -- 2-3 canonical games demonstrating this mechanic
#   synonyms      -- alternate names that map to this canonical term
#   bgg_ids       -- BGG mechanic ID(s) that map to this term
#   bgg_names     -- BGG mechanic name(s) that map to this term

# ============================================================================
# ROOT MECHANICS -- Ancient/foundational, no clear single ancestor
# ============================================================================

- slug: dice-rolling
  name: Dice Rolling
  definition: >-
    Players roll dice to generate random outcomes that determine actions,
    movement, combat results, or resource production. The core mechanic is
    accepting randomized input and making decisions based on or despite
    the result. Distinguished from push-your-luck by the absence of
    voluntary stop/continue decisions on the roll itself.
  ancestor_slugs: []
  children_slugs:
    - dice-placement
    - push-your-luck
    - roll-and-write
    - re-rolling-and-locking
    - dice-combat
  origin_game: Backgammon
  origin_year: -3000
  era: ancient
  examples:
    - Catan
    - King of Tokyo
    - Sagrada
  synonyms: []
  bgg_ids: [2072]
  bgg_names: ["Dice Rolling"]

- slug: hand-management
  name: Hand Management
  definition: >-
    Players hold a private set of cards and must decide which to play,
    when to play them, and which to retain for future turns. The core
    tension is opportunity cost -- playing a card now means not having it
    later. Distinguished from tableau-building by the emphasis on timing
    and sequencing rather than permanent placement.
  ancestor_slugs: []
  children_slugs:
    - card-drafting
    - deck-building
    - melding
    - trick-taking
    - multi-use-cards
    - card-driven
    - card-combat
    - deck-construction
    - tableau-building
  origin_game: Rummy
  origin_year: 1890
  era: traditional
  examples:
    - Twilight Struggle
    - Concordia
    - 7 Wonders
  synonyms: []
  bgg_ids: [2040]
  bgg_names: ["Hand Management"]

- slug: area-control
  name: Area Control
  definition: >-
    Players compete for dominance over defined regions of a shared map.
    Control is typically determined by having the most units, influence,
    or presence in a region. Scoring occurs for controlling or having
    majority in areas. Distinguished from area-movement by the emphasis
    on relative presence (majority) rather than traversal.
  ancestor_slugs: []
  children_slugs:
    - area-movement
    - enclosure
    - tug-of-war
    - king-of-the-hill
  origin_game: Go
  origin_year: -2000
  era: ancient
  examples:
    - El Grande
    - Blood Rage
    - Inis
  synonyms:
    - area-majority
    - area-influence
  bgg_ids: [2080]
  bgg_names: ["Area Majority / Influence"]

- slug: set-collection
  name: Set Collection
  definition: >-
    Players gather specific combinations of items (cards, tiles, tokens)
    that score points or grant abilities when completed. The core mechanic
    is identifying which sets to pursue and competing with opponents for
    shared resources. Distinguished from pattern-building by the emphasis
    on accumulation of matching items rather than spatial arrangement.
  ancestor_slugs: []
  children_slugs:
    - pattern-building
    - contracts
    - melding
  origin_game: Rummy
  origin_year: 1890
  era: traditional
  examples:
    - Ticket to Ride
    - Jaipur
    - Azul
  synonyms: []
  bgg_ids: [2004]
  bgg_names: ["Set Collection"]

- slug: trading-and-negotiation
  name: Trading and Negotiation
  definition: >-
    Players exchange resources, promises, or favors through direct
    interpersonal communication. Deals may be binding or non-binding.
    The core mechanic is social -- reading opponents, making offers,
    and leveraging asymmetric needs. Distinguished from auction by
    the bilateral (or multilateral) nature rather than competitive bidding.
  ancestor_slugs: []
  children_slugs:
    - auction
    - bribery
    - i-cut-you-choose
    - alliances
    - voting
  origin_game: Diplomacy
  origin_year: 1959
  era: classical
  examples:
    - Catan
    - Chinatown
    - Cosmic Encounter
  synonyms:
    - negotiation
    - trading
  bgg_ids: [2008]
  bgg_names: ["Trading", "Negotiation"]

- slug: tile-placement
  name: Tile Placement
  definition: >-
    Players place tiles onto a shared or personal play area, creating
    or extending a spatial structure. Placement decisions consider
    adjacency, orientation, and how the tile interacts with its
    neighbors. Distinguished from modular-board by the emphasis on
    player-driven placement as the core decision rather than setup.
  ancestor_slugs: []
  children_slugs:
    - enclosure
    - map-addition
    - map-exploration
    - network-building
    - modular-board
    - pattern-building
  origin_game: Dominoes
  origin_year: 1200
  era: traditional
  examples:
    - Carcassonne
    - Azul
    - Cascadia
  synonyms: []
  bgg_ids: [2002]
  bgg_names: ["Tile Placement"]

- slug: action-points
  name: Action Points
  definition: >-
    Each turn, players receive a fixed budget of action points and
    choose how to spend them across available actions. Different
    actions may cost different amounts. The core tension is allocation --
    you can do many small things or one big thing. Distinguished from
    action-selection by the fungible, spendable nature of the points.
  ancestor_slugs: []
  children_slugs:
    - action-selection
  origin_game: Pandemic
  origin_year: 2008
  era: modern
  examples:
    - Pandemic
    - Tikal
    - Dead of Winter
  synonyms:
    - action-point-allowance
  bgg_ids: [2001]
  bgg_names: ["Action Points"]

- slug: trick-taking
  name: Trick Taking
  definition: >-
    Players play cards from their hand in a series of rounds (tricks).
    Each trick has a lead suit, and the highest card of the lead suit
    (or trump suit) wins the trick. The core mechanic is deduction
    and timing -- tracking what's been played and managing your hand
    to win specific tricks. One of the oldest card game mechanics.
  ancestor_slugs:
    - hand-management
  children_slugs:
    - ladder-climbing
  origin_game: Karnöffel
  origin_year: 1426
  era: traditional
  examples:
    - The Crew
    - Fox in the Forest
    - Bridge
  synonyms: []
  bgg_ids: [2009]
  bgg_names: ["Trick-taking"]

# ============================================================================
# ACTION / TURN STRUCTURE MECHANICS
# ============================================================================

- slug: action-selection
  name: Action Selection
  definition: >-
    Players choose from a shared or personal menu of available actions
    each turn, with no point budget -- you simply pick one (or a
    prescribed number). Actions may become unavailable after selection.
    Distinguished from action-points by the discrete, non-fungible nature
    of the choices, and from worker-placement by the absence of blocking.
  ancestor_slugs:
    - action-points
  children_slugs:
    - worker-placement
    - rondel
    - follow
    - variable-phase-order
  origin_game: Puerto Rico
  origin_year: 2002
  era: modern
  examples:
    - Puerto Rico
    - Concordia
    - Great Western Trail
  synonyms: []
  bgg_ids: [2838]
  bgg_names: ["Action Drafting"]

- slug: worker-placement
  name: Worker Placement
  definition: >-
    Players assign a limited pool of worker tokens to action spaces on
    a shared board. Each space typically accepts only one worker, creating
    a blocking/exclusivity constraint -- if an opponent takes a space, you
    cannot use it this round. The core tension is prioritization under
    scarcity. Distinguished from action-selection by the blocking mechanism
    and the physical placement of tokens.
  ancestor_slugs:
    - action-selection
  children_slugs:
    - dice-placement
    - worker-placement-different-types
    - action-retrieval
    - worker-placement-with-bumping
  origin_game: Caylus
  origin_year: 2005
  era: modern
  examples:
    - Agricola
    - Viticulture
    - Lords of Waterdeep
  synonyms: []
  bgg_ids: [2082]
  bgg_names: ["Worker Placement"]

- slug: worker-placement-different-types
  name: Worker Placement with Different Worker Types
  definition: >-
    An evolution of worker placement where workers are not interchangeable --
    different workers have different abilities, costs, or access to different
    action spaces. Adds a layer of strategic consideration to which worker
    to assign where. Distinguished from basic worker-placement by the
    asymmetry between worker tokens.
  ancestor_slugs:
    - worker-placement
  children_slugs: []
  origin_game: Tzolk'in
  origin_year: 2012
  era: modern
  examples:
    - Tzolk'in
    - Architects of the West Kingdom
    - Paladins of the West Kingdom
  synonyms: []
  bgg_ids: [2933]
  bgg_names: ["Worker Placement, Different Worker Types"]

- slug: dice-placement
  name: Dice Placement
  definition: >-
    A variant of worker placement where dice serve as workers. The die
    value determines which action spaces are available or how effective
    the placement is. Combines the randomness of dice-rolling with the
    spatial blocking of worker-placement. Distinguished from basic
    worker-placement by the random element of die values.
  ancestor_slugs:
    - worker-placement
    - dice-rolling
  children_slugs: []
  origin_game: Alien Frontiers
  origin_year: 2010
  era: modern
  examples:
    - Alien Frontiers
    - Troyes
    - Marco Polo
  synonyms:
    - worker-placement-with-dice-workers
  bgg_ids: [2935]
  bgg_names: ["Worker Placement with Dice Workers"]

- slug: rondel
  name: Rondel
  definition: >-
    Players move a marker around a circular track of action spaces.
    Movement is typically limited (1-3 spaces forward), creating a
    rhythm where certain actions become available in predictable but
    constrained patterns. The core tension is tempo -- moving further
    costs more but reaches better actions. Distinguished from action-
    selection by the spatial, sequential constraint.
  ancestor_slugs:
    - action-selection
  children_slugs: []
  origin_game: Antike
  origin_year: 2005
  era: modern
  examples:
    - Navegador
    - Teotihuacan
    - Trajan
  synonyms: []
  bgg_ids: [2831]
  bgg_names: ["Rondel"]

- slug: simultaneous-action-selection
  name: Simultaneous Action Selection
  definition: >-
    All players secretly and simultaneously choose their actions, then
    reveal them at the same time. The core mechanic is prediction --
    anticipating what opponents will choose and selecting accordingly.
    Distinguished from sequential action-selection by the hidden,
    simultaneous nature of decisions.
  ancestor_slugs: []
  children_slugs:
    - programmed-movement
    - roll-and-write
  origin_game: Rock Paper Scissors
  origin_year: -200
  era: ancient
  examples:
    - 7 Wonders
    - Sushi Go!
    - Gloomhaven
  synonyms:
    - simultaneous-play
  bgg_ids: [2020]
  bgg_names: ["Simultaneous Action Selection"]

- slug: programmed-movement
  name: Programmed Movement
  definition: >-
    Players pre-program a sequence of actions or movements before
    execution, then all programs resolve in order. The core tension
    is the gap between planning and execution -- other players' programs
    may invalidate your assumptions. Distinguished from simultaneous-
    action-selection by the sequential, multi-step programming.
  ancestor_slugs:
    - simultaneous-action-selection
  children_slugs: []
  origin_game: RoboRally
  origin_year: 1994
  era: modern
  examples:
    - RoboRally
    - Colt Express
    - Space Alert
  synonyms: []
  bgg_ids: [2078]
  bgg_names: ["Programmed Movement"]

- slug: real-time
  name: Real-Time
  definition: >-
    Players act simultaneously without taking turns, racing against
    a clock or each other. There is no turn structure -- speed of
    decision-making and execution matters. Distinguished from
    simultaneous-action-selection by the continuous, unstructured
    nature of play (no discrete rounds of simultaneous choice).
  ancestor_slugs: []
  children_slugs:
    - speed-matching
    - elapsed-real-time
  origin_game: Pit
  origin_year: 1904
  era: classical
  examples:
    - Galaxy Trucker
    - Space Alert
    - Captain Sonar
  synonyms: []
  bgg_ids: [2832]
  bgg_names: ["Real-Time"]

- slug: follow
  name: Follow / Role Selection
  definition: >-
    One player selects an action or role, and other players may follow
    (perform a weaker version of that action) or do something else.
    The selector typically gets a bonus. The core tension is leading
    vs. following -- do you select the action you want, or follow
    someone else's lead for a weaker benefit?
  ancestor_slugs:
    - action-selection
  children_slugs: []
  origin_game: Puerto Rico
  origin_year: 2002
  era: modern
  examples:
    - Puerto Rico
    - Race for the Galaxy
    - Eminent Domain
  synonyms:
    - role-selection
  bgg_ids: [2854]
  bgg_names: ["Follow"]

# ============================================================================
# CARD MECHANICS
# ============================================================================

- slug: card-drafting
  name: Card Drafting
  definition: >-
    Players select cards from a shared pool -- either an open display,
    a rotating hand of cards (draft), or a market. The core mechanic
    is evaluation under incomplete information: which card is most
    valuable to you, and which are you willing to let opponents take?
    Distinguished from hand-management by the shared selection pool
    rather than playing from a private hand.
  ancestor_slugs:
    - hand-management
  children_slugs:
    - open-drafting
    - closed-drafting
  origin_game: Fairy Tale
  origin_year: 2004
  era: modern
  examples:
    - 7 Wonders
    - Blood Rage
    - Sushi Go!
  synonyms:
    - drafting
  bgg_ids: [2984, 2041]
  bgg_names: ["Open Drafting", "Card Drafting"]

- slug: deck-building
  name: Deck Building
  definition: >-
    Each player starts with an identical small deck and acquires new
    cards during play that are shuffled into their personal deck.
    The deck IS your engine -- it improves as you add powerful cards
    and (critically) remove weak ones. Distinguished from hand-management
    by the dynamic, evolving composition of your card pool, and from
    card-drafting by the cycling/reshuffling mechanic.
  ancestor_slugs:
    - hand-management
  children_slugs:
    - bag-building
    - pool-building
  origin_game: Dominion
  origin_year: 2008
  era: modern
  examples:
    - Dominion
    - Star Realms
    - Clank!
  synonyms:
    - deckbuilding
  bgg_ids: [2664]
  bgg_names: ["Deck, Bag, and Pool Building"]

- slug: bag-building
  name: Bag Building
  definition: >-
    A physical variant of deck-building where players draw tokens
    from a bag rather than cards from a deck. Tokens are added and
    removed over the course of the game. The bag provides the same
    evolving-pool mechanic as a deck but with tactile, non-card
    components. Distinguished from deck-building by the physical
    medium (bag of tokens vs. shuffled cards).
  ancestor_slugs:
    - deck-building
  children_slugs: []
  origin_game: Orléans
  origin_year: 2014
  era: modern
  examples:
    - Orléans
    - Quacks of Quedlinburg
    - Altiplano
  synonyms: []
  bgg_ids: [2664]
  bgg_names: ["Deck, Bag, and Pool Building"]

- slug: pool-building
  name: Pool Building
  definition: >-
    A generalization of deck-building where players build a pool
    of resources (dice, tokens, cards, or other components) that
    grows and improves over the game. The pool may not cycle through
    a discard/reshuffle like a deck -- components may persist in play.
    Distinguished from deck-building by the broader scope of pooled
    components and the absence of mandatory cycling.
  ancestor_slugs:
    - deck-building
  children_slugs: []
  origin_game: Quarriors!
  origin_year: 2011
  era: modern
  examples:
    - Quarriors!
    - Dice Forge
    - Automobiles
  synonyms: []
  bgg_ids: [2664]
  bgg_names: ["Deck, Bag, and Pool Building"]

- slug: tableau-building
  name: Tableau Building
  definition: >-
    Players build a personal display (tableau) of cards or tiles in
    front of them. Cards in the tableau provide ongoing effects,
    scoring conditions, or production abilities. The tableau represents
    your engine/infrastructure. Distinguished from hand-management
    by the permanent, visible nature of placed cards (they stay in
    play rather than being consumed).
  ancestor_slugs:
    - hand-management
  children_slugs:
    - engine-building
  origin_game: San Juan
  origin_year: 2004
  era: modern
  examples:
    - Wingspan
    - Race for the Galaxy
    - Terraforming Mars
  synonyms: []
  bgg_ids: [2828]
  bgg_names: ["Tableau Building"]

- slug: multi-use-cards
  name: Multi-Use Cards
  definition: >-
    Cards can be used for multiple distinct purposes -- as an action,
    for resources, as a map element, for combat value, etc. Players must
    choose which use to apply, creating opportunity cost on every card.
    Distinguished from hand-management by the explicit mechanical
    duality designed into each card.
  ancestor_slugs:
    - hand-management
  children_slugs: []
  origin_game: Glory to Rome
  origin_year: 2005
  era: modern
  examples:
    - Concordia
    - Innovation
    - Mottainai
  synonyms: []
  bgg_ids: [2965]
  bgg_names: ["Multi-Use Cards"]

- slug: melding
  name: Melding and Splaying
  definition: >-
    Players form groups of cards (melds) by matching suits, values,
    or other attributes, and lay them on the table. Splaying refers
    to fanning cards to reveal icons on partially hidden cards.
    A traditional card game mechanic adapted into modern designs.
  ancestor_slugs:
    - hand-management
    - set-collection
  children_slugs: []
  origin_game: Rummy
  origin_year: 1890
  era: traditional
  examples:
    - Innovation
    - Lost Cities
    - Rummy
  synonyms:
    - melding-and-splaying
  bgg_ids: [2048]
  bgg_names: ["Melding and Splaying"]

- slug: ladder-climbing
  name: Ladder Climbing
  definition: >-
    Players play cards or combinations that must beat the previous
    play in value or rank. Play continues until all players pass,
    then the last player to play leads the next round. The "ladder"
    is the escalating minimum. Distinguished from trick-taking by the
    variable-length rounds and the emphasis on shedding cards rather
    than winning individual tricks.
  ancestor_slugs:
    - trick-taking
  children_slugs: []
  origin_game: Tichu
  origin_year: 1991
  era: modern
  examples:
    - Tichu
    - Haggis
    - Scout
  synonyms:
    - climbing
  bgg_ids: [2850]
  bgg_names: ["Ladder Climbing"]

# ============================================================================
# ECONOMIC / ENGINE MECHANICS
# ============================================================================

- slug: resource-management
  name: Resource Management
  definition: >-
    Players collect, store, convert, and spend various resources to
    take actions and score points. The core tension is allocation --
    which resources to acquire, when to convert, and when to spend.
    This is a broad, foundational mechanic present in most strategy
    games. Distinguished from engine-building by the emphasis on
    allocation rather than production optimization.
  ancestor_slugs: []
  children_slugs:
    - engine-building
    - market
    - income
    - resource-conversion
    - closed-economy
    - loans
  origin_game: Monopoly
  origin_year: 1935
  era: classical
  examples:
    - Catan
    - Agricola
    - Terraforming Mars
  synonyms: []
  bgg_ids: []
  bgg_names: []

- slug: engine-building
  name: Engine Building
  definition: >-
    Players construct a personal system (the "engine") of interlocking
    components that produces increasingly powerful outputs over time.
    Early turns invest in infrastructure; later turns harvest the
    compound returns. The core satisfaction is watching your engine
    accelerate. Distinguished from resource-management by the emphasis
    on constructing a production system rather than managing individual
    resources.
  ancestor_slugs:
    - resource-management
    - tableau-building
  children_slugs:
    - chaining-combos
    - tech-tree
  origin_game: Race for the Galaxy
  origin_year: 2007
  era: modern
  examples:
    - Terraforming Mars
    - Wingspan
    - Gizmos
  synonyms:
    - combo-building
  bgg_ids: [2902]
  bgg_names: ["Income"]

- slug: auction
  name: Auction / Bidding
  definition: >-
    Players compete for items, rights, or privileges by placing bids.
    The highest bidder wins the item and pays their bid (or a variant).
    Auction formats include English (ascending), Dutch (descending),
    sealed-bid, and once-around. The core mechanic is valuation -- how
    much is this item worth to you vs. your opponents?
  ancestor_slugs:
    - trading-and-negotiation
  children_slugs:
    - auction-english
    - auction-dutch
    - auction-sealed-bid
    - auction-once-around
    - turn-order-auction
  origin_game: Medici
  origin_year: 1995
  era: modern
  examples:
    - Ra
    - Power Grid
    - Modern Art
  synonyms:
    - bidding
  bgg_ids: [2012]
  bgg_names: ["Auction/Bidding"]

- slug: market
  name: Market
  definition: >-
    A shared economic mechanism where goods have prices that fluctuate
    based on supply, demand, or other game-state factors. Players buy
    and sell at market prices. Distinguished from auction by the
    impersonal, systemic nature of pricing (the market sets prices,
    not competing bids).
  ancestor_slugs:
    - resource-management
  children_slugs:
    - stock-holding
  origin_game: Civilization
  origin_year: 1980
  era: classical
  examples:
    - Power Grid
    - Istanbul
    - Clans of Caledonia
  synonyms: []
  bgg_ids: [2900]
  bgg_names: ["Market"]

- slug: stock-holding
  name: Stock Holding
  definition: >-
    Players buy and sell shares or stakes in companies, factions, or
    entities whose value fluctuates during the game. Dividends, mergers,
    and market manipulation are common. The core mechanic is speculation
    and investment. Distinguished from market by the focus on ownership
    stakes rather than commodity trading.
  ancestor_slugs:
    - market
  children_slugs:
    - commodity-speculation
    - investment
  origin_game: Acquire
  origin_year: 1964
  era: classical
  examples:
    - Acquire
    - 18xx series
    - Indonesian
  synonyms: []
  bgg_ids: [2005]
  bgg_names: ["Stock Holding"]

- slug: pick-up-and-deliver
  name: Pick-Up and Deliver
  definition: >-
    Players transport goods, passengers, or resources from one location
    to another on the game board to fulfill contracts or score points.
    The core mechanic is route optimization -- planning efficient paths
    that pick up at source and deliver to destination. Distinguished
    from network-building by the emphasis on traversal rather than
    construction.
  ancestor_slugs:
    - area-movement
  children_slugs: []
  origin_game: Merchant of Venus
  origin_year: 1988
  era: modern
  examples:
    - Merchants & Marauders
    - Xia
    - Istanbul
  synonyms: []
  bgg_ids: [2007]
  bgg_names: ["Pick-up and Deliver"]

- slug: contracts
  name: Contracts
  definition: >-
    Players claim objective cards (contracts) that specify required
    deliverables (sets of resources, routes completed, etc.) and
    provide rewards upon fulfillment. The core tension is selecting
    contracts you can efficiently complete while blocking opponents
    from easy ones.
  ancestor_slugs:
    - set-collection
  children_slugs: []
  origin_game: Ticket to Ride
  origin_year: 2004
  era: modern
  examples:
    - Ticket to Ride
    - Istanbul
    - Great Western Trail
  synonyms:
    - objectives
  bgg_ids: [2893]
  bgg_names: ["Contracts"]

- slug: tech-tree
  name: Tech Tree / Tech Track
  definition: >-
    Players advance along branching or linear tracks that unlock new
    abilities, units, or actions. Earlier technologies often prerequisite
    later ones. The core mechanic is long-term strategic planning --
    choosing a development path and committing to it. Distinguished
    from engine-building by the structured, often shared progression
    path.
  ancestor_slugs:
    - engine-building
  children_slugs: []
  origin_game: Civilization
  origin_year: 1980
  era: classical
  examples:
    - Through the Ages
    - Terra Mystica
    - Tapestry
  synonyms:
    - technology-tree
    - tech-tracks
  bgg_ids: [2849]
  bgg_names: ["Tech Trees / Tech Tracks"]

# ============================================================================
# SPATIAL / MOVEMENT MECHANICS
# ============================================================================

- slug: area-movement
  name: Area Movement
  definition: >-
    Players move units between defined regions (areas) on a map. Areas
    are connected by adjacency, and movement typically costs actions
    or movement points. Distinguished from point-to-point by the
    region-based (rather than node-based) map structure, and from
    grid-movement by the irregular, non-uniform area shapes.
  ancestor_slugs:
    - area-control
  children_slugs:
    - pick-up-and-deliver
    - hidden-movement
    - point-to-point-movement
