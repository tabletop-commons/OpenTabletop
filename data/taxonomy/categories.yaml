- slug: push-your-luck-game
  name: Push-Your-Luck Game
  definition: >-
    Games where the core tension is deciding when to stop pressing your
    luck. Each successive action or roll increases potential reward but
    also risk of losing everything accumulated.
  defining_characteristics:
    - Escalating risk/reward curve
    - Voluntary stop/continue decisions
    - Bust or loss condition on push too far
    - Emotional tension as primary experience
  origin_era: classical
  origin_context: >-
    Push-your-luck is one of the oldest game dynamics (dice games).
    The modern category includes Quacks of Quedlinburg (2018),
    Can't Stop (1980), and Incan Gold (2005).
  canonical_examples:
    - "Quacks of Quedlinburg"
    - "Can't Stop"
    - Incan Gold
  related_categories: []
  synonyms:
    - press-your-luck
  bgg_ids: []
  bgg_names: []

- slug: tile-laying-game
  name: Tile-Laying Game
  definition: >-
    Games where placing tiles to build a shared or personal geography
    IS the core activity. The spatial puzzle of tile placement defines
    the experience more than any other mechanism.
  defining_characteristics:
    - Tile placement as primary activity
    - Spatial puzzle (adjacency, orientation, coverage)
    - Map or pattern emerges during play
    - Often combined with area scoring
  origin_era: modern
  origin_context: >-
    Defined by Carcassonne (2000), which made tile-laying the entire
    game rather than a supporting mechanism. The category expanded
    with Cascadia (2021), Isle of Skye (2015), and Kingdomino (2016).
  canonical_examples:
    - Carcassonne
    - Cascadia
    - Kingdomino
  related_categories:
    - family
  synonyms: []
  bgg_ids: []
  bgg_names: []

- slug: print-and-play
  name: Print-and-Play
  definition: >-
    Games distributed as digital files for home printing and assembly.
    A distribution format rather than a design philosophy, but a
    recognized category with a dedicated community and design
    conventions (minimal components, standard paper sizes).
  defining_characteristics:
    - Distributed as downloadable files
    - Player prints and assembles components
    - Minimal component requirements
    - Often free or low-cost
    - Active design community
  origin_era: modern
  origin_context: >-
    Print-and-play gaming grew with internet distribution in the 2000s
    and accelerated during COVID-19 lockdowns. BGG hosts thousands of
    PnP designs, and dedicated contests (PnP design contests) support
    the community.
  canonical_examples:
    - various PnP contest winners
    - Sprawlopolis (PnP edition)
    - "Mini Rogue (PnP edition)"
  related_categories: []
  synonyms:
    - pnp
  bgg_ids: []
  bgg_names: []

- slug: educational
  name: Educational Game
  definition: >-
    Games designed with an explicit learning objective. Teaching content
    through game mechanics — history, math, science, language, or other
    subjects. Distinguished from games that incidentally teach strategy
    or social skills.
  defining_characteristics:
    - Explicit learning objective
    - Educational content integrated into mechanics
    - Often designed for classroom or family use
    - Assessment or knowledge-check elements
  origin_era: classical
  origin_context: >-
    Educational games span centuries but became a recognized modern
    category with Timeline (2012), various STEM games, and the
    serious games movement in education.
  canonical_examples:
    - Timeline
    - Wits and Wagers
    - Evolution
  related_categories:
    - family
  synonyms:
    - serious-game
    - learning-game
