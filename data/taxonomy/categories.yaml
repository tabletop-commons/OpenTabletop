- slug: trick-taking-game
  name: Trick-Taking Game
  definition: >-
    Games where playing cards into tricks with rank and suit rules IS
    the game. The trick-taking mechanism is not just present — it is the
    entirety of the mechanical experience.
  defining_characteristics:
    - Card play into tricks with rank/suit hierarchy
    - Lead-follow structure
    - Trump suits or trump cards
    - Hand evaluation and card counting
  origin_era: traditional
  origin_context: >-
    Trick-taking has centuries of tradition (Whist, Bridge). Modern
    hobby trick-taking games include The Crew (2019), Fox in the
    Forest (2017), and Skull King (2013).
  canonical_examples:
    - "The Crew"
    - Fox in the Forest
    - Bridge
