# OpenTabletop Canonical Themes Taxonomy
#
# Themes answer "what is this game about?" at the setting/subject level.
# Unlike mechanics (phylogenetic tree) or categories (emergent clusters),
# themes are a controlled tag list with optional hierarchical grouping.
# A game about pirates in space gets tagged "pirates" and "space."
#
# Structure:
#   slug               -- canonical identifier (lowercase, hyphenated)
#   name               -- display name
#   definition         -- precise, distinguishing definition
#   parent_slug        -- optional hierarchical grouping (null if root)
#   children_slugs     -- child themes
#   canonical_examples -- 3 games strongly associated with this theme
#   synonyms           -- alternate names
#   bgg_ids            -- BGG sub-domain/category ID(s) for this theme
#   bgg_names          -- BGG sub-domain/category name(s)

# ============================================================================
# SETTINGS / GEOGRAPHY
# ============================================================================

- slug: fantasy
  name: Fantasy
  definition: >-
    Games set in worlds with magic, mythical creatures, or supernatural
    elements. Includes high fantasy (epic quests, wizards), dark fantasy
    (grimdark), and fairy-tale settings. The setting is non-historical
    and features elements that violate real-world physics.
  parent_slug: null
  children_slugs:
    - fairy-tale
  canonical_examples:
    - Gloomhaven
    - Mage Knight
    - Descent
  synonyms:
    - high-fantasy
    - dark-fantasy
  bgg_ids: [1010]
  bgg_names: ["Fantasy"]

- slug: fairy-tale
  name: Fairy Tale / Storybook
  definition: >-
    Games with whimsical, folk-tale, or storybook settings. Lighter tone
    than general fantasy -- fairy godmothers, enchanted forests, talking
    animals. Often family-friendly.
  parent_slug: fantasy
  children_slugs: []
  canonical_examples:
    - Once Upon a Time
    - Stuffed Fables
    - Mice and Mystics
  synonyms:
    - storybook
    - folk-tale
  bgg_ids: []
  bgg_names: []

